name: Merge app.js 3 parts

on:
  workflow_dispatch:
  push:
    paths:
      - 'static/app.js.p3'

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Merge app.js parts
        run: |
          if [ ! -f "static/app.js.p1" ] || [ ! -f "static/app.js.p2" ] || [ ! -f "static/app.js.p3" ]; then
            echo "Parts not found"
            ls static/app.js.p* 2>/dev/null || echo "No parts found"
            exit 1
          fi
          
          cat static/app.js.p1 static/app.js.p2 static/app.js.p3 > static/app.js
          
          SIZE=$(wc -c < static/app.js)
          echo "Merged app.js size: $SIZE bytes"
          
          rm static/app.js.p1 static/app.js.p2 static/app.js.p3
          
      - name: Commit merged file
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add static/app.js
          git rm --cached static/app.js.p1 static/app.js.p2 static/app.js.p3 2>/dev/null || true
          git commit -m "fix: merge full app.js (160KB) from 3 parts" || echo "Nothing to commit"
          git push
