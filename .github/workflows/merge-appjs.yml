name: Merge app.js parts

on:
  workflow_dispatch:
  push:
    paths:
      - 'static/app.js.part2'

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Merge app.js parts
        run: |
          # Check if both parts exist
          if [ ! -f "static/app.js.part1" ] || [ ! -f "static/app.js.part2" ]; then
            echo "Parts not found, skipping merge"
            exit 0
          fi
          
          # Concatenate parts
          cat static/app.js.part1 static/app.js.part2 > static/app.js
          
          # Verify the size
          SIZE=$(wc -c < static/app.js)
          echo "Merged app.js size: $SIZE bytes"
          
          # Remove temp files
          rm static/app.js.part1 static/app.js.part2
          
      - name: Commit merged file
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add static/app.js
          git rm --cached static/app.js.part1 static/app.js.part2 2>/dev/null || true
          git commit -m "merge: combine app.js parts into full 160KB file" || echo "Nothing to commit"
          git push
