name: Merge app.js chunks

on:
  workflow_dispatch:
  push:
    paths:
      - 'static/app.js.c16'

jobs:
  merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Merge
        run: |
          files=(static/app.js.c01 static/app.js.c02 static/app.js.c03 static/app.js.c04 static/app.js.c05 static/app.js.c06 static/app.js.c07 static/app.js.c08 static/app.js.c09 static/app.js.c10 static/app.js.c11 static/app.js.c12 static/app.js.c13 static/app.js.c14 static/app.js.c15 static/app.js.c16)
          for f in "${files[@]}"; do [ -f "$f" ] || { echo "Missing $f"; exit 1; }; done
          cat "${files[@]}" > static/app.js
          echo "Size: $(wc -c < static/app.js) bytes"
          rm "${files[@]}"
      - name: Commit
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add static/app.js
          for f in c01 c02 c03 c04 c05 c06 c07 c08 c09 c10 c11 c12 c13 c14 c15 c16; do git rm --cached "static/app.js.$f" 2>/dev/null || true; done
          git commit -m "fix: restore full app.js 160KB from 16 chunks" || echo "Nothing to commit"
          git push
